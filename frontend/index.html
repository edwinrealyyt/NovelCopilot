<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Novel Creation Copilot - 智能全栈小说创作辅助系统</title>
    <!-- 引入高品质现代字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 基础过渡动画与阴影 */
            --glow-primary: 0 0 15px rgba(0, 242, 254, 0.3);
            --glow-secondary: 0 0 15px rgba(138, 43, 226, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            --font-ui: 'Outfit', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
            --font-novel: 'Noto Serif SC', Georgia, serif;
            --font-mono: 'Fira Code', Consolas, monospace;
            
            --color-success: #00e676;
            --color-warning: #ff9100;
            --color-danger: #ff5252;
            --color-info: #00b0ff;
        }

        /* 1. 霓虹暗黑主题 (默认) */
        body, body.theme-neon {
            --bg-base: #0a0a0f;
            --bg-surface: rgba(20, 20, 32, 0.65);
            --bg-surface-opaque: #141420;
            --bg-surface-hover: rgba(30, 30, 48, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --color-primary: #00f2fe;
            --color-secondary: #8a2be2;
            --text-main: #f5f5fa;
            --text-muted: #8e8ea8;
            --text-dark: #4b4b60;
            --body-bg-gradient: radial-gradient(circle at 10% 20%, rgba(20, 10, 40, 0.4) 0%, transparent 50%), radial-gradient(circle at 90% 80%, rgba(10, 30, 50, 0.4) 0%, transparent 50%);
        }

        /* 2. 极客深蓝主题 */
        body.theme-blue {
            --bg-base: #080d1a;
            --bg-surface: rgba(16, 26, 51, 0.65);
            --bg-surface-opaque: #101a33;
            --bg-surface-hover: rgba(26, 41, 77, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --color-primary: #0074d9;
            --color-secondary: #00b0ff;
            --text-main: #f4f6fa;
            --text-muted: #738aad;
            --text-dark: #3b4e6a;
            --body-bg-gradient: radial-gradient(circle at 10% 20%, rgba(0, 80, 160, 0.25) 0%, transparent 50%), radial-gradient(circle at 90% 80%, rgba(10, 20, 50, 0.3) 0%, transparent 50%);
        }

        /* 3. 雅致纸墨主题 (浅色护眼) */
        body.theme-paper {
            --bg-base: #f5f5ee;
            --bg-surface: rgba(255, 255, 255, 0.8);
            --bg-surface-opaque: #ffffff;
            --bg-surface-hover: rgba(240, 240, 230, 0.95);
            --border-color: rgba(0, 0, 0, 0.08);
            --border-highlight: rgba(0, 0, 0, 0.15);
            --color-primary: #5c6b73;
            --color-secondary: #93b1a6;
            --text-main: #2b2d42;
            --text-muted: #6c757d;
            --text-dark: #adb5bd;
            --body-bg-gradient: none;
        }

        /* 4. 静谧森林主题 */
        body.theme-forest {
            --bg-base: #0a1410;
            --bg-surface: rgba(20, 36, 28, 0.7);
            --bg-surface-opaque: #14241c;
            --bg-surface-hover: rgba(28, 51, 40, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --color-primary: #2ecc71;
            --color-secondary: #27ae60;
            --text-main: #e8f5e9;
            --text-muted: #81c784;
            --text-dark: #388e3c;
            --body-bg-gradient: radial-gradient(circle at 10% 20%, rgba(46, 204, 113, 0.15) 0%, transparent 50%), radial-gradient(circle at 90% 80%, rgba(20, 40, 30, 0.3) 0%, transparent 50%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-base);
            background-image: var(--body-bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-ui);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
        }

        /* 隐藏滚动条但保留功能 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 布局容器 */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 磨砂玻璃面板基础样式 */
        .glass-panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--glass-shadow);
        }

        /* 左侧边栏 - 导航与书籍管理 */
        .sidebar {
            width: 320px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background: var(--bg-surface-opaque);
            z-index: 10;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow-primary);
        }

        .logo-icon svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .logo-text span {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* 连接状态栏 */
        .conn-status-bar {
            padding: 4px 12px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.15);
        }
        
        .conn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        /* 书籍选择与删除布局 */
        .book-selector-container {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .book-select-row {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
        }

        .book-select-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .book-select {
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-ui);
            font-size: 14px;
            appearance: none;
            cursor: pointer;
            outline: none;
        }

        .book-select:focus {
            border-color: var(--color-primary);
        }

        .book-select-wrapper::after {
            content: "▼";
            font-size: 10px;
            color: var(--text-muted);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .btn-delete-book {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.25);
            color: var(--color-danger);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-delete-book:hover {
            background: var(--color-danger);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 82, 82, 0.3);
        }

        .btn-new-book {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, rgba(0, 242, 254, 0.1), rgba(138, 43, 226, 0.1));
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 8px;
            color: var(--color-primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-new-book:hover {
            border-color: var(--color-primary);
            box-shadow: var(--glow-primary);
        }

        /* 章节树状大纲目录 */
        .outline-tree-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }

        .tree-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding-left: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .volume-item {
            margin-bottom: 16px;
        }

        .volume-header {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .volume-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .volume-icon {
            margin-right: 8px;
            transition: transform 0.2s;
        }

        .volume-item.collapsed .volume-icon {
            transform: rotate(-90deg);
        }

        .chapter-list {
            margin-left: 20px;
            border-left: 1px solid var(--border-color);
            padding-left: 6px;
            overflow: hidden;
        }

        .volume-item.collapsed .chapter-list {
            display: none;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-muted);
        }

        .chapter-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
        }

        .chapter-item.active {
            background: rgba(0, 242, 254, 0.08);
            border-left: 3px solid var(--color-primary);
            color: var(--text-main);
            padding-left: 9px;
        }

        .chapter-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .status-pending { background-color: var(--color-warning); box-shadow: 0 0 6px var(--color-warning); }
        .status-approved { background-color: var(--color-info); box-shadow: 0 0 6px var(--color-info); }
        .status-completed { background-color: var(--color-success); box-shadow: 0 0 6px var(--color-success); }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            background: rgba(5, 5, 10, 0.2);
        }

        .btn-footer {
            flex: 1;
            padding: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-footer:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* 主内容区 */
        .main-content {
            flex-grow: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 顶部元数据与进度条 */
        .meta-header {
            padding: 20px 32px;
            background: rgba(12, 12, 20, 0.4);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .meta-title-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .meta-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meta-title {
            font-size: 22px;
            font-weight: 700;
        }

        .meta-badge {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--border-color);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--color-primary);
        }

        .meta-desc {
            font-size: 13px;
            color: var(--text-muted);
            max-width: 480px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-stats-group {
            display: flex;
            gap: 32px;
        }

        .progress-stat {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 180px;
        }

        .stat-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(to right, var(--color-primary), var(--color-info));
            border-radius: 10px;
            width: 0%;
        }

        .progress-bar-fill.secondary {
            background: linear-gradient(to right, var(--color-secondary), var(--color-primary));
        }

        /* 核心业务容器面 */
        .workspace-panel {
            flex-grow: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 新书创建面板样式 */
        .create-book-card {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px;
            width: 100%;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-input, .form-textarea, .form-select {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-ui);
            font-size: 14px;
            outline: none;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: var(--color-primary);
            background: rgba(0, 0, 0, 0.25);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            opacity: 0.95;
        }

        /* 章节推进面板 */
        .chapter-copilot-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
            height: 100%;
        }

        .copilot-main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        .copilot-side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        .setting-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
        }

        .inline-setting-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .inline-setting {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .inline-setting select {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 12px;
            outline: none;
        }

        /* 状态A: 梗概确认框 (Pending) */
        .outline-approve-box {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .outline-title-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-sub-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .outline-editor-textarea {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            color: var(--text-main);
            font-family: var(--font-ui);
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .outline-editor-textarea:focus {
            border-color: var(--color-primary);
        }

        .meta-estimate-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            gap: 12px;
        }

        .estimate-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .estimate-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .estimate-val {
            font-size: 16px;
            font-weight: 700;
            color: var(--color-primary);
        }

        .estimate-val.highlight {
            color: var(--color-warning);
        }

        .actions-row {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-action.primary {
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            border: none;
            color: #fff;
        }

        .btn-action.secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        /* 状态B: 正文编辑区 (Completed) */
        .novel-editor-box {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 520px;
        }

        .editor-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
        }

        .editor-header-title {
            font-size: 15px;
            font-weight: 600;
        }

        .novel-textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 24px;
            color: var(--text-main);
            font-family: var(--font-novel);
            font-size: 17px;
            line-height: 2.0;
            resize: none;
            outline: none;
            overflow-y: auto;
            letter-spacing: 0.5px;
        }

        /* 设定集悬浮卡 */
        .panel-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel-card-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .setting-tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .setting-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .setting-chip:hover {
            background: rgba(0, 242, 254, 0.06);
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* 去AI化对比高亮 */
        .de-ai-comparison {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .comparison-item {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .original-text {
            color: var(--color-danger);
            text-decoration: line-through;
            opacity: 0.7;
        }

        .replaced-text {
            color: var(--color-success);
            font-weight: 500;
        }

        /* 逻辑校验日志 */
        .logic-check-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 240px;
            overflow-y: auto;
        }

            left: 0;

            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;

            opacity: 1;
            pointer-events: auto;

            width: 480px;

        .neon-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid transparent;
            border-top: 3px solid var(--color-primary);
            border-bottom: 3px solid var(--color-secondary);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            position: relative;
        }

        .neon-spinner::after {
            content: "";
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border: 3px solid transparent;
            border-left: 3px solid var(--color-info);
            border-right: 3px solid var(--color-success);
            border-radius: 50%;
            animation: spin-reverse 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

            font-size: 16px;

        }

        .tab-btn:hover {
            color: var(--text-main);

        .tab-btn.active {
            color: var(--color-primary);

        .theme-selector-group {

            font-size: 12px;
            color: var(--text-muted);

        .theme-dot {

            height: 14px;

            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .theme-dot.neon { background: #00f2fe; }
        .theme-dot.blue { background: #0074d9; }
        .theme-dot.paper { background: #5c6b73; }
        .theme-dot.forest { background: #2ecc71; }
        
        .empty-state {

        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--color-primary);
            border-radius: 8px;

        .toast.success { border-left-color: var(--color-success); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #file-upload-input {

                gemini: state.apiKeys.gemini || "",
                deepseek: state.apiKeys.deepseek || "",
                claude: state.apiKeys.claude || ""
            };

            if (isFullStackMode) {
                try {
                    const res = await fetch("/api/models/discover", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).catch(() => fetch(`${API_BASE}/api/models/discover`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }));
                    
                    if (res.ok) {
                        state.availableModels = await res.json();
                        // 修正当前书籍模型选项
                        const book = state.books.find(b => b.book_id === state.currentBookId);
                        if (book && state.availableModels.length > 0) {
                            const exists = state.availableModels.some(m => m.model_id === book.settings.current_model);
                            if (!exists) {
                                book.settings.current_model = state.availableModels[0].model_id;
                            }
                        }
                    }
                } catch(e) {
                    console.error("无法动态拉取可用模型", e);
                }
            } else {
                // Sandbox 脱机模式下的模型发现模拟
                state.availableModels = [];
                if (payload.gemini) {
                    state.availableModels.push(
                        { provider: "gemini", model_id: "gemini-1.5-pro", display_name: "Gemini - 1.5 Pro (模拟)" },
                        { provider: "gemini", model_id: "gemini-1.5-flash", display_name: "Gemini - 1.5 Flash (模拟)" }
                    );
                }
                if (payload.deepseek) {
                    state.availableModels.push(
                        { provider: "deepseek", model_id: "deepseek-coder", display_name: "DeepSeek - Coder (模拟)" },
                        { provider: "deepseek", model_id: "deepseek-chat", display_name: "DeepSeek - Chat (模拟)" }
                    );
                }
                
                const book = state.books.find(b => b.book_id === state.currentBookId);
                if (book && state.availableModels.length > 0) {
                    const exists = state.availableModels.some(m => m.model_id === book.settings.current_model);
                    if (!exists) {
                        book.settings.current_model = state.availableModels[0].model_id;
                    }
                }
            }
        }

        // 加载书籍数据
        async function loadBooksData() {
            if (isFullStackMode) {
                try {
                    const res = await fetch("/api/books").catch(() => fetch(`${API_BASE}/api/books`));
                    const list = await res.json();
                    
                    state.books = [];
                    for (let item of list) {
                        const bookRes = await fetch(`/api/books/${item.book_id}`).catch(() => fetch(`${API_BASE}/api/books/${item.book_id}`));
                        const bookDetail = await bookRes.json();
                        state.books.push(bookDetail);
                    }
                    
                    if (state.books.length > 0) {
                        state.currentBookId = state.books[0].book_id;
                        state.selectedVolumeId = state.books[0].outline.volumes[0].volume_id;
                        state.selectedChapterId = state.books[0].outline.volumes[0].chapters[0].chapter_id;
                    }
                } catch(err) {
                    showToast("后端数据载入出错: " + err.message, "error");
                }
            } else {
                const saved = localStorage.getItem('novel_copilot_state');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        state.books = parsed.books || LOCAL_SANDBOX_BOOKS;
                        state.currentBookId = parsed.currentBookId || "book-1";
                    } catch(e) {
                        state.books = LOCAL_SANDBOX_BOOKS;
                        state.currentBookId = "book-1";
                    }
                } else {
                    state.books = LOCAL_SANDBOX_BOOKS;
                    state.currentBookId = "book-1";
                }
                
                const book = state.books.find(b => b.book_id === state.currentBookId);
                if (book && book.outline.volumes.length > 0) {
                    state.selectedVolumeId = book.outline.volumes[0].volume_id;
                    state.selectedChapterId = book.outline.volumes[0].chapters[0].chapter_id;
                }
            }
        }

        // 状态保存
        function saveStateToStorage() {
            localStorage.setItem('novel_copilot_state', JSON.stringify({
                books: state.books,
                currentBookId: state.currentBookId,
                apiKeys: state.apiKeys,
                currentTheme: state.currentTheme
            }));
        }

        function loadLocalSettings() {
            const saved = localStorage.getItem('novel_copilot_state');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.apiKeys = parsed.apiKeys || { gemini: '', deepseek: '', claude: '' };
                    state.currentTheme = parsed.currentTheme || 'neon';
                } catch(e) {}
            }
        }

        // 删除当前书籍项目
        async function triggerDeleteCurrentBook() {
            if (!state.currentBookId) {
                showToast("当前没有可删除的书籍", "warning");
                return;
            }

            const book = state.books.find(b => b.book_id === state.currentBookId);
            if (!confirm(`⚠️ 警告: 您确定要删除书籍《${book.meta.title}》吗？该操作不可撤销，对应的全部大纲及已生成正文都将被永久删除。`)) {
                return;
            }

            if (isFullStackMode) {
                try {
                    const res = await fetch(`/api/books/${state.currentBookId}`, {
                        method: 'DELETE'
                    }).catch(() => fetch(`${API_BASE}/api/books/${state.currentBookId}`, {
                        method: 'DELETE'
                    }));
                    
                    if (res.ok) {
                        showToast(`书籍《${book.meta.title}》已成功删除。`);
                    } else {
                        throw new Error("HTTP Status Error");
                    }
                } catch(e) {
                    showToast("删除书籍失败: " + e.message, "error");
                    return;
                }
            } else {
                state.books = state.books.filter(b => b.book_id !== state.currentBookId);
                saveStateToStorage();
                showToast(`书籍《${book.meta.title}》已从本地缓存中删除。`);
            }

            await loadBooksData();
            
            if (state.books.length > 0) {
                switchBook(state.books[0].book_id);
            } else {
                state.currentBookId = null;
                state.selectedVolumeId = null;
                state.selectedChapterId = null;
                initBookDropdown();
                renderBookMeta();
                renderOutlineTree();
                showNewBookForm();
            }
        }

        // 初始化下拉单
        function initBookDropdown() {
            const selector = document.getElementById('book-selector');
            selector.innerHTML = '';
            
            if (state.books.length === 0) {
                const opt = document.createElement('option');
                opt.innerText = "-- 暂无书籍 --";
                selector.appendChild(opt);
                return;
            }

            state.books.forEach(book => {
                const opt = document.createElement('option');
                opt.value = book.book_id;
                opt.innerText = book.meta.title;
                if (book.book_id === state.currentBookId) {
                    opt.selected = true;
                }
                selector.appendChild(opt);
            });
        }

        // 切换书籍
        async function switchBook(bookId) {
            state.currentBookId = bookId;
            let book = state.books.find(b => b.book_id === bookId);
            
            if (isFullStackMode) {
                try {
                    const res = await fetch(`/api/books/${bookId}`).catch(() => fetch(`${API_BASE}/api/books/${bookId}`));
                    book = await res.json();
                    const idx = state.books.findIndex(b => b.book_id === bookId);
                    if (idx !== -1) state.books[idx] = book;
                } catch(err) {
                    showToast("拉取书籍详情失败", "error");
                }
            }

            if (book && book.outline.volumes.length > 0) {
                state.selectedVolumeId = book.outline.volumes[0].volume_id;
                if (book.outline.volumes[0].chapters.length > 0) {
                    state.selectedChapterId = book.outline.volumes[0].chapters[0].chapter_id;
                } else {
                    state.selectedChapterId = null;
                }
            }
            
            saveStateToStorage();
            renderBookMeta();
            renderOutlineTree();
            renderCurrentWorkspace();
            showToast(`已切换至书籍《${book ? book.meta.title : ''}》`);
        }

        // 提交创建书籍
        async function submitCreateBook() {
            const title = document.getElementById('new-title').value.trim();
            const tagsInput = document.getElementById('new-tags').value.trim();
            const targetWords = parseInt(document.getElementById('new-target-words').value) || 120000;
            const dailyWords = parseInt(document.getElementById('new-daily-words').value) || 6000;
            const background = document.getElementById('new-background').value.trim();
            const synopsis = document.getElementById('new-synopsis').value.trim();

            if (!title) {
                showToast("书籍名称不能为空！", "error");
                return;
            }

            const overlay = document.getElementById('ai-loading-overlay');
            overlay.classList.add('active');

            const payload = {
                title,
                tags: tagsInput ? tagsInput.split(',').map(t => t.trim()) : ["未分类"],
                background,
                synopsis,
                target_word_count: targetWords,
                daily_update_words: dailyWords
            };

            if (isFullStackMode) {
                try {
                    const res = await fetch("/api/books", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).catch(() => fetch(`${API_BASE}/api/books`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }));

                    const book = await res.json();
                    state.books.push(book);
                    state.currentBookId = book.book_id;
                    state.selectedVolumeId = book.outline.volumes[0].volume_id;
                    state.selectedChapterId = book.outline.volumes[0].chapters[0].chapter_id;
                    
                    showToast(`全栈书籍《${title}》全部卷章已生成并显示完毕！`);
                } catch(err) {
                    showToast("后端创建新书失败: " + err.message, "error");
                } finally {
                    overlay.classList.remove('active');
                }
            } else {
                setTimeout(() => {
                    const book_id = "book-" + Date.now();
                    const totalChapters = Math.max(1, Math.floor(targetWords / 3000));
                    
                    let chaptersPerVolume = 10;
                    if (totalChapters <= 10) chaptersPerVolume = 5;
                    else if (totalChapters > 30) chaptersPerVolume = 15;
                    
                    const numVolumes = Math.ceil(totalChapters / chaptersPerVolume);
                    const volumes = [];
                    let globalIdx = 1;

                    for (let v = 1; v <= numVolumes; v++) {
                        const volChapters = [];
                        const startCh = globalIdx;
                        
                        let currentVolChaptersCount = chaptersPerVolume;
                        if (v === numVolumes) {
                            currentVolChaptersCount = totalChapters - ((v - 1) * chaptersPerVolume);
                        }

                        for (let c = 1; c <= currentVolChaptersCount; c++) {
                            const cNum = globalIdx;
                            let chTitle = `第${cNum}章：剧情过渡与修行磨砺`;
                            let chSummary = `本章中主角将面临新的磨炼与配角之间的博弈，逐渐累积底牌。`;
                            
                            if (cNum === 1) {
                                chTitle = "第一章：突如其来的变故";
                                chSummary = "交代设定与初始危机，金手指唤醒。";
                            } else if (cNum === 2) {
                                chTitle = "第二章：破釜沉舟的修行";
                                chSummary = "主角调试并熟悉金手指，提升实力打脸前期配角。";
                            }

                            volChapters.push({
                                chapter_id: v * 100 + c,
                                title: chTitle,
                                summary: chSummary,
                                status: "pending",
                                content: ""
                            });
                            globalIdx++;
                        }

                        volumes.push({
                            volume_id: v,
                            volume_title: `第${v}卷：探索与推进期`,
                            volume_summary: `本卷包含第 ${startCh} 章至第 ${globalIdx - 1} 章。`,
                            chapters: volChapters
                        });
                    }

                    const newBook = {
                        book_id,
                        meta: payload,
                        outline: { volumes },
                        settings: { current_model: "", de_ai_level: "medium" }
                    };

                    state.books.push(newBook);
                    state.currentBookId = book_id;
                    state.selectedVolumeId = 1;
                    state.selectedChapterId = 101;
                    
                    saveStateToStorage();
                    showToast(`本地 Sandbox 书籍《${title}》卷章已显示！`);
                    overlay.classList.remove('active');
                    finishBookCreationUI();
                }, 2000);
                return;
            }

            finishBookCreationUI();
        }

        function finishBookCreationUI() {
            initBookDropdown();
            renderBookMeta();
            renderOutlineTree();
            switchTab('dashboard');
        }

        // 渲染元数据
        function renderBookMeta() {
            const book = state.books.find(b => b.book_id === state.currentBookId);
            if (!book) {
                document.getElementById('current-book-title').innerText = "未加载书籍";
                document.getElementById('current-book-tags').innerText = "无标签";
                document.getElementById('current-book-synopsis').innerText = "请创建或选择一本书籍。";
                updateProgress(0, 0, 0, 0, 0, 0);
                return;
            }

            document.getElementById('current-book-title').innerText = book.meta.title;
            document.getElementById('current-book-tags').innerText = book.meta.tags.join(' / ');
            document.getElementById('current-book-synopsis').innerText = book.meta.synopsis || "暂无简介";

            let currentWords = 0;
            let totalChapters = 0;
            let completedChapters = 0;

            book.outline.volumes.forEach(vol => {
                vol.chapters.forEach(ch => {
                    totalChapters++;
                    if (ch.status === 'completed') {
                        completedChapters++;
                        currentWords += ch.content ? ch.content.length : 0;
                    }
                });
            });

            const wordPercent = book.meta.target_word_count > 0 ? (currentWords / book.meta.target_word_count) * 100 : 0;
            const chapterPercent = totalChapters > 0 ? (completedChapters / totalChapters) * 100 : 0;

            updateProgress(currentWords, book.meta.target_word_count, wordPercent, completedChapters, totalChapters, chapterPercent);
        }

        function updateProgress(currWords, targetWords, wordPercent, compChaps, totalChaps, chapPercent) {
            document.getElementById('word-progress-text').innerText = `${currWords.toLocaleString()} / ${targetWords.toLocaleString()} 字`;
            document.getElementById('word-progress-fill').style.width = `${Math.min(wordPercent, 100)}%`;
            
            document.getElementById('chapter-progress-text').innerText = `${compChaps} / ${totalChaps} 章 (${Math.round(chapPercent)}%)`;
            document.getElementById('chapter-progress-fill').style.width = `${Math.min(chapPercent, 100)}%`;
        }

        // 大纲刷新
        async function loadBookOutline() {
            if (!state.currentBookId) return;
            if (isFullStackMode) {
                try {
                    const res = await fetch(`/api/books/${state.currentBookId}`).catch(() => fetch(`${API_BASE}/api/books/${state.currentBookId}`));
                    const book = await res.json();
                    const idx = state.books.findIndex(b => b.book_id === state.currentBookId);
                    if (idx !== -1) {
                        state.books[idx] = book;
                        renderOutlineTree();
                        renderBookMeta();
                        renderCurrentWorkspace();
                        showToast("大纲数据已从后端刷新！");
                    }
                } catch(e) {
                    showToast("同步大纲失败", "error");
                }
            }
        }

        // 渲染树
        function renderOutlineTree() {
            const treeContainer = document.getElementById('outline-tree');
            treeContainer.innerHTML = '';
            const book = state.books.find(b => b.book_id === state.currentBookId);
            if (!book || !book.outline.volumes) {
                treeContainer.innerHTML = '<div class="empty-state">暂无章节结构</div>';
                return;
            }

            book.outline.volumes.forEach(vol => {
                const volDiv = document.createElement('div');
                volDiv.className = 'volume-item';
                
                const header = document.createElement('div');
                header.className = 'volume-header';
                header.innerHTML = `
                    <span class="volume-icon">▼</span>
                    <span>${vol.volume_title}</span>
                `;
                
                header.onclick = () => {
                    volDiv.classList.toggle('collapsed');
                    header.querySelector('.volume-icon').innerText = volDiv.classList.contains('collapsed') ? "▶" : "▼";
                };

                const chList = document.createElement('div');
                chList.className = 'chapter-list';

                vol.chapters.forEach(ch => {
                    const chItem = document.createElement('div');
                    chItem.className = `chapter-item ${ch.chapter_id === state.selectedChapterId ? 'active' : ''}`;
                    chItem.innerHTML = `
                        <span>${ch.title}</span>
                        <div class="chapter-status-dot status-${ch.status}"></div>
                    `;

                    chItem.onclick = (e) => {
                        e.stopPropagation();
                        selectChapter(vol.volume_id, ch.chapter_id);
                    };

                    chList.appendChild(chItem);
                });

                volDiv.appendChild(header);
                volDiv.appendChild(chList);
                treeContainer.appendChild(volDiv);
            });
        }

        function selectChapter(volumeId, chapterId) {
            state.selectedVolumeId = volumeId;
            state.selectedChapterId = chapterId;
            saveStateToStorage();
            
            const items = document.querySelectorAll('.chapter-item');
            items.forEach(it => it.classList.remove('active'));
            
            renderOutlineTree();
            
            if (state.activeTab !== 'dashboard') {
                switchTab('dashboard');
            } else {
                renderCurrentWorkspace();
            }
        }

        // 切换导航Tab
        function switchTab(tabId) {
            state.activeTab = tabId;
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(t => {
                if (t.id === `tab-${tabId}`) {
                    t.classList.add('active');
                } else {
                    t.classList.remove('active');
                }
            });

            renderCurrentWorkspace();
        }

        // 渲染主工作区
        function renderCurrentWorkspace() {
            const panel = document.getElementById('workspace-panel');
            panel.innerHTML = '';

            const book = state.books.find(b => b.book_id === state.currentBookId);
            if (!book) {
                panel.innerHTML = `
                    <div class="glass-panel empty-state">
                        <h3>欢迎来到 AI Novel Creation Copilot</h3>
                        <p>请点击左下角“创建新书籍项目”或导入已有的 JSON 备份开始。</p>
                    </div>
                `;
                return;
            }

            if (state.activeTab === 'dashboard') {
                renderDashboard(panel, book);
            } else if (state.activeTab === 'outline') {
                renderOutlineBoard(panel, book);
            } else if (state.activeTab === 'scheduler') {
                renderSchedulerTable(panel, book);
            }
        }

        // 渲染工作台 (包含对动态可用模型的读取渲染)
        function renderDashboard(container, book) {
            if (!state.selectedChapterId) {
                container.innerHTML = `<div class="glass-panel empty-state"><p>💡 请在左侧目录树中选择一个要编辑或推进的章节。</p></div>`;
                return;
            }

            const volume = book.outline.volumes.find(v => v.volume_id === state.selectedVolumeId);
            const chapter = volume ? volume.chapters.find(c => c.chapter_id === state.selectedChapterId) : null;

            if (!chapter) {
                container.innerHTML = `<div class="glass-panel empty-state"><p>未找到章节数据。</p></div>`;
                return;
            }

            const dashboardGrid = document.createElement('div');
            dashboardGrid.className = 'chapter-copilot-container';

            const leftCol = document.createElement('div');
            leftCol.className = 'copilot-main-panel';

            // 动态大模型下拉列表渲染 (若没有可用模型显示空备选项并降级 sandbox 模拟器)
            let modelSelectHtml = "";
            if (state.availableModels.length === 0) {
                modelSelectHtml = `<option value="">无可用大模型 (自动开启本地沙盒模拟器)</option>`;
            } else {
                modelSelectHtml = state.availableModels.map(m => `
                    <option value="${m.model_id}" ${book.settings.current_model === m.model_id ? 'selected' : ''}>
                        ${m.display_name}
                    </option>
                `).join('');
            }

            // 设置栏
            const settingCard = document.createElement('div');
            settingCard.className = 'glass-panel setting-bar';
            settingCard.innerHTML = `
                <div class="inline-setting-group">
                    <div class="inline-setting">
                        <span>可用大模型选择：</span>
                        <select id="model-select" onchange="updateBookSetting('current_model', this.value)">
                            ${modelSelectHtml}
                        </select>
                    </div>
                    <div class="inline-setting">
                        <span>去AI词汇级别：</span>
                        <select id="de-ai-select" onchange="updateBookSetting('de_ai_level', this.value)">

        // 异步Token及计费评估 (CNY)
        async function triggerAsyncEstimate(model, inputText) {
            if (isFullStackMode && model) {
                try {
                    const res = await fetch(`/api/estimate?model=${model}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ input_text: inputText })
                    }).catch(() => fetch(`${API_BASE}/api/estimate?model=${model}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ input_text: inputText })
                    }));
                    
                    const est = await res.json();
                    const costCny = est.estimated_cost_usd; 
                    
                    document.getElementById('est-input-tokens').innerText = `${est.input_tokens} Tokens`;
                    document.getElementById('est-output-tokens').innerText = `${est.output_tokens} Tokens`;
                    document.getElementById('est-cost').innerText = `¥${costCny.toFixed(4)}`;
                } catch(e) {
                    console.error("Token估算失败", e);
                }
            }
        }

        // 获取人民币模型费率 (CNY / 1M Tokens)
        function getModelRateCNY(model) {
            if (!model) return { input: 0.0, output: 0.0 };
            const m = model.toLowerCase();
            if (m.includes('pro')) return { input: 50.75, output: 152.25 };
            if (m.includes('flash')) return { input: 10.88, output: 32.63 };
            if (m.includes('sonnet')) return { input: 21.75, output: 108.75 };
            if (m.includes('coder')) return { input: 1.45, output: 5.80 };
            return { input: 5.0, output: 15.0 }; // 默认合理备用
        }

                try {

                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: titleInput, summary: summaryInput })
                    }));
                    
                    const book = await res.json();
                    const idx = state.books.findIndex(b => b.book_id === state.currentBookId);
                    state.books[idx] = book;

        // 智能生成正文 (管线调用)
        async function generateChapterBody(volumeId, chapterId) {

            const book = state.books.find(b => b.book_id === state.currentBookId);
            const activeKey = getActiveApiKey(book.settings.current_model);

            const overlay = document.getElementById('ai-loading-overlay');
            const loadTitle = document.getElementById('ai-loading-title');
            const loadSubtitle = document.getElementById('ai-loading-subtitle');
            
            overlay.classList.add('active');

            loadSubtitle.innerText = "智能装载设定集并执行痕迹去AI化优化...";

            if (isFullStackMode && book.settings.current_model) {
                try {
                    const res = await fetch(`/api/books/${state.currentBookId}/chapters/${chapterId}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: titleInput,
                            summary: summaryInput,
                            api_key: activeKey
                        })
                    }).catch(() => fetch(`${API_BASE}/api/books/${state.currentBookId}/chapters/${chapterId}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: titleInput,
                            summary: summaryInput,
                            api_key: activeKey
                        })
                    }));

                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        await loadBooksData();
                        
                        state.activeDeAiChanges = data.de_ai_changes || [];
                        state.activeLogicReports = data.logic_reports || [];
                        
                        renderOutlineTree();
                        renderBookMeta();
                        renderCurrentWorkspace();
                        showToast("大模型正文与优化管线处理完毕！");

                    overlay.classList.remove('active');

                    state.activeLogicReports = [

                    }).catch(() => fetch(`${API_BASE}/api/books/${state.currentBookId}/chapters/${chapterId}/de_ai`, {
                        method: 'POST'
                    }));
                    
                    const data = await res.json();

                }
            } else {
                const book = state.books.find(b => b.book_id === state.currentBookId);
                const volume = book.outline.volumes.find(v => v.volume_id === volumeId);
                const chapter = volume.chapters.find(c => c.chapter_id === chapterId);
                
                if (!chapter.content) return;
                
                chapter.content = chapter.content.replace(/总而言之/g, "如此说来");
                state.activeDeAiChanges = [{ original: "总而言之", replacement: "如此说来" }];
                
                saveStateToStorage();
                renderCurrentWorkspace();
                showToast("本地Sandbox一键优化完毕！");
            }
        }

        function getActiveApiKey(model) {
            if (!model) return '';
            const m = model.toLowerCase();
            if (m.includes('gemini')) return state.apiKeys.gemini;
            if (m.includes('deepseek') || m.includes('chat') || m.includes('coder')) return state.apiKeys.deepseek;
            if (m.includes('claude') || m.includes('sonnet')) return state.apiKeys.claude;
            return '';
        }

        // 模态配置
        function openApiModal() {
            document.getElementById('key-gemini').value = state.apiKeys.gemini;
            document.getElementById('key-deepseek').value = state.apiKeys.deepseek;
            document.getElementById('key-claude').value = state.apiKeys.claude;
            document.getElementById('api-modal').classList.add('active');
        }

        function closeApiModal() {
            document.getElementById('api-modal').classList.remove('active');
        }

        async function saveApiKeys() {
            state.apiKeys.gemini = document.getElementById('key-gemini').value.trim();
            state.apiKeys.deepseek = document.getElementById('key-deepseek').value.trim();
            state.apiKeys.claude = document.getElementById('key-claude').value.trim();
            saveStateToStorage();
            
            // 每次保存 Key，立刻动态发现并刷新可用模型列表！
            showToast("正在连接大模型接口进行实际可用模型探测...");
            await discoverAvailableModels();
            
            closeApiModal();
            renderCurrentWorkspace(); // 重新渲染工作台的下拉框
            showToast(`模型配置发现完毕，当前可用模型数量: ${state.availableModels.length}`);
        }

        // 数据备份导出 JSON
        function exportData() {
            const dataStr = JSON.stringify(state.books, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `novel_copilot_backup_${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("数据备份文件已导出！");
        }

        function triggerImport() {
            document.getElementById('file-upload-input').click();
        }

        function handleFileImport(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const imported = JSON.parse(evt.target.result);
                    if (Array.isArray(imported)) {
                        state.books = imported;
                    } else if (imported.BookContext) {
                        state.books = [imported.BookContext];
                    } else {
                        throw new Error("格式不合法");
                    }
                    if (state.books.length > 0) {
                        state.currentBookId = state.books[0].book_id;
                    }
                    saveStateToStorage();
                    initBookDropdown();
                    renderBookMeta();
                    renderOutlineTree();
                    renderCurrentWorkspace();
                    showToast("数据导入成功！");
                } catch(err) {
                    showToast("导入失败: " + err.message, "error");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
